# .github/workflows/deploy.yml
# Auto-deploy Prabhupada Slokas to the EXISTING Cloudflare Pages project on push.
# Option B: builds the Expo web export and uploads it with Wrangler. No new Pages
# project, no custom-domain changes — the domain binding that just broke is never touched.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [pwa-cloudflare]   # the branch your live site is built from
  workflow_dispatch:             # lets you trigger a deploy manually from the Actions tab

env:
  CF_PROJECT: prabhupadaslokas
  # IMPORTANT: set this to your Pages project's *Production branch*
  # (Cloudflare dashboard -> Workers & Pages -> prabhupadaslokas ->
  #  Settings -> Builds & deployments -> Production branch).
  # If --branch does not match it, the upload becomes a *preview* deploy and your
  # custom domain will NOT update (CI still goes green — a silent no-op).
  CF_PRODUCTION_BRANCH: pwa-cloudflare

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4        # uses the pnpm version pinned in package.json "packageManager"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (Expo export + PWA post-build patch)
        working-directory: artifacts/sloka-hub
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          pnpm dlx wrangler@3.90.0 pages deploy artifacts/sloka-hub/dist
          --project-name=${{ env.CF_PROJECT }}
          --branch=${{ env.CF_PRODUCTION_BRANCH }}
