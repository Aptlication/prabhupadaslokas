name: Deploy to Cloudflare Pages

on:
  push:
    branches: [pwa-cloudflare]
  workflow_dispatch:

env:
  CF_PROJECT: prabhupadaslokas
  CF_PRODUCTION_BRANCH: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: artifacts/sloka-hub
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          pnpm dlx wrangler@3.90.0 pages deploy artifacts/sloka-hub/dist
          --project-name=${{ env.CF_PROJECT }}
          --branch=${{ env.CF_PRODUCTION_BRANCH }}
