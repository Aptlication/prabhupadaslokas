kind = "mobile"
previewPath = "/"
title = "Sloka Hub"
version = "1.0.0"
id = "artifacts/sloka-hub"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 25935

[services.development]
run = "pnpm --filter @workspace/sloka-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sloka-hub", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sloka-hub", "run", "serve" ]

[services.env]
PORT = "25935"
BASE_PATH = "/"
